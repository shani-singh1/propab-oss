name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Fetch real graph datasets
        # graph_invariants + network_diffusion run on real SNAP/KONECT networks that
        # are git-ignored. Fetch them so the graph tests + the routing inspector run
        # with real data on CI (locally these tests skip cleanly when absent).
        run: python scripts/fetch_graph_datasets.py

      - name: Run tests
        run: pytest tests/ -q --tb=short

      - name: Routing inspector (zero mismatches)
        run: python scripts/inspect_hypothesis_routing.py --corpus --require-zero-mismatches

      - name: Domain preflights (non-stub)
        run: |
          python -c "
          from propab.domain_modules.registry import all_plugins
          for p in all_plugins():
              r = p.preflight()
              assert r.passed, f'{p.domain_id}: {r.reason}'
          print('all preflights passed')
          "

  compose-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Compose file
        run: docker compose -f docker-compose.yml config -q

      - name: Validate production Compose file
        run: docker compose -f docker-compose.prod.yml config -q

      - name: Build API and orchestrator images
        run: docker compose -f docker-compose.yml build api orchestrator
