version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      - DATABASE_URL=postgresql+asyncpg://propab:propab@postgres:5432/propab
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=propab
      - MINIO_SECRET_KEY=propab_secret
      - MINIO_BUCKET=propab
      - MINIO_SECURE=false
      - PROPAB_DATA_DIR=/data/propab
      - LIFETIME_STORE_BACKEND=postgres
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://127.0.0.1:11434}
      - EMBED_PROVIDER=${EMBED_PROVIDER:-openai}
      - EMBED_MODEL=${EMBED_MODEL:-text-embedding-3-small}
      - ORCHESTRATOR_URL=http://orchestrator:8010
      - ORCHESTRATOR_INTERNAL_TOKEN=${ORCHESTRATOR_INTERNAL_TOKEN:-}
      - PROPAB_PROFILE=${PROPAB_PROFILE:-campaign}
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - propab_data:/data/propab
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_started
      orchestrator:
        condition: service_started

  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    ports:
      - "8010:8010"
    environment:
      - DATABASE_URL=postgresql+asyncpg://propab:propab@postgres:5432/propab
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=propab
      - MINIO_SECRET_KEY=propab_secret
      - MINIO_BUCKET=propab
      - MINIO_SECURE=false
      - PROPAB_DATA_DIR=/data/propab
      - LIFETIME_STORE_BACKEND=postgres
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://127.0.0.1:11434}
      - EMBED_PROVIDER=${EMBED_PROVIDER:-openai}
      - EMBED_MODEL=${EMBED_MODEL:-text-embedding-3-small}
      - ORCHESTRATOR_INTERNAL_TOKEN=${ORCHESTRATOR_INTERNAL_TOKEN:-}
      # C3b: opt-in orchestrator LLM reasoning loop (default off = mechanical expansion).
      - ORCHESTRATOR_REASONING_ENABLED=${ORCHESTRATOR_REASONING_ENABLED:-false}
      - PROPAB_PROFILE=${PROPAB_PROFILE:-campaign}
      # Use the real dedicated literature service for prior-building.
      - LITERATURE_SERVICE_URL=${LITERATURE_SERVICE_URL:-http://literature:8020}
    restart: unless-stopped
    volumes:
      - propab_data:/data/propab
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_started
      literature:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    command: ["celery", "-A", "services.worker.celery_app", "worker", "--loglevel=info", "--concurrency=16"]
    environment:
      - DATABASE_URL=postgresql+asyncpg://propab:propab@postgres:5432/propab
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=propab
      - MINIO_SECRET_KEY=propab_secret
      - MINIO_BUCKET=propab
      - MINIO_SECURE=false
      - PROPAB_DATA_DIR=/data/propab
      - LIFETIME_STORE_BACKEND=postgres
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://127.0.0.1:11434}
      - EMBED_PROVIDER=${EMBED_PROVIDER:-openai}
      - EMBED_MODEL=${EMBED_MODEL:-text-embedding-3-small}
      - PROPAB_PROFILE=${PROPAB_PROFILE:-campaign}
      - LITERATURE_SERVICE_URL=${LITERATURE_SERVICE_URL:-http://literature:8020}
      # General-agent redesign (S0): dissolve the plugin path — every hypothesis runs
      # the general think-act experimenter with the full tool catalog. Default false.
      - WORKER_GENERAL_AGENT_MODE=${WORKER_GENERAL_AGENT_MODE:-false}
      # Sandbox reuses the worker image so free-form code has numpy/scipy/torch (network off).
      - SANDBOX_IMAGE=${SANDBOX_IMAGE:-propab-oss-worker:latest}
    restart: unless-stopped
    volumes:
      - propab_data:/data/propab
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_started

  # Dedicated literature intelligence service (real papers: arXiv/OEIS/Semantic
  # Scholar/zbMath/PubMed/…). Runs standalone with in-memory backends by default;
  # set LITERATURE_POSTGRES_BACKEND/QDRANT_BACKEND for persistence in prod.
  literature:
    build:
      context: .
      dockerfile: services/literature/Dockerfile
    ports:
      - "8020:8020"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - SEMANTIC_SCHOLAR_API_KEY=${SEMANTIC_SCHOLAR_API_KEY:-}
      - NCBI_API_KEY=${NCBI_API_KEY:-}
      - LITERATURE_LLM_PROVIDER=${LITERATURE_LLM_PROVIDER:-gemini}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

  # One-shot schema migration: Alembic is the single source of truth for the DB schema.
  # Runs `alembic upgrade head` and exits; all app services wait for it to finish.
  migrate:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    command: ["alembic", "upgrade", "head"]
    environment:
      - DATABASE_URL=postgresql+asyncpg://propab:propab@postgres:5432/propab
      - DATABASE_URL_SYNC=postgresql+psycopg://propab:propab@postgres:5432/propab
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: propab
      POSTGRES_USER: propab
      POSTGRES_PASSWORD: propab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U propab -d propab"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.7.0
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    # No healthcheck: the qdrant:v1.7.0 image ships no wget/curl and dash lacks
    # /dev/tcp, so any in-container HTTP/TCP probe fails even while qdrant serves
    # 200 on /healthz (false-negative). Dependents use `service_started`, not
    # `service_healthy`, and `restart: unless-stopped` recovers crashes.

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: propab
      MINIO_ROOT_PASSWORD: propab_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
  propab_data:
