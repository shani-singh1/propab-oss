version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      - DATABASE_URL=postgresql+asyncpg://propab:propab@postgres:5432/propab
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=propab
      - MINIO_SECRET_KEY=propab_secret
      - MINIO_BUCKET=propab
      - MINIO_SECURE=false
      - PROPAB_DATA_DIR=/data/propab
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://127.0.0.1:11434}
      - EMBED_PROVIDER=${EMBED_PROVIDER:-openai}
      - EMBED_MODEL=${EMBED_MODEL:-text-embedding-3-small}
      - ORCHESTRATOR_URL=http://orchestrator:8010
      - ORCHESTRATOR_INTERNAL_TOKEN=${ORCHESTRATOR_INTERNAL_TOKEN:-}
    ports:
      - "8000:8000"
    volumes:
      - propab_data:/data/propab
    depends_on:
      - postgres
      - redis
      - qdrant
      - minio
      - orchestrator

  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    ports:
      - "8010:8010"
    environment:
      - DATABASE_URL=postgresql+asyncpg://propab:propab@postgres:5432/propab
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=propab
      - MINIO_SECRET_KEY=propab_secret
      - MINIO_BUCKET=propab
      - MINIO_SECURE=false
      - PROPAB_DATA_DIR=/data/propab
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://127.0.0.1:11434}
      - EMBED_PROVIDER=${EMBED_PROVIDER:-openai}
      - EMBED_MODEL=${EMBED_MODEL:-text-embedding-3-small}
      - ORCHESTRATOR_INTERNAL_TOKEN=${ORCHESTRATOR_INTERNAL_TOKEN:-}
    volumes:
      - propab_data:/data/propab
    depends_on:
      - postgres
      - redis
      - qdrant
      - minio

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    environment:
      - DATABASE_URL=postgresql+asyncpg://propab:propab@postgres:5432/propab
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=propab
      - MINIO_SECRET_KEY=propab_secret
      - MINIO_BUCKET=propab
      - MINIO_SECURE=false
      - PROPAB_DATA_DIR=/data/propab
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://127.0.0.1:11434}
      - EMBED_PROVIDER=${EMBED_PROVIDER:-openai}
      - EMBED_MODEL=${EMBED_MODEL:-text-embedding-3-small}
    volumes:
      - propab_data:/data/propab
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - postgres
      - redis
      - qdrant
      - minio

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: propab
      POSTGRES_USER: propab
      POSTGRES_PASSWORD: propab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.7.0
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: propab
      MINIO_ROOT_PASSWORD: propab_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
  propab_data:
