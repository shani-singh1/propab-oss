# Stable overlay for long campaign runs — disable uvicorn --reload so file saves
# don't kill the in-flight campaign loop.
#
#   docker compose -f docker-compose.yml -f docker-compose.mount-dev.yml -f docker-compose.campaign-run.yml up -d

services:
  orchestrator:
    command: >
      uvicorn services.orchestrator.main:app --host 0.0.0.0 --port 8010

  api:
    command: >
      uvicorn services.api.app.main:app --host 0.0.0.0 --port 8000
